<!doctype html>
<!--
  Source for public/og-image.png (the social share card, 1200×630).
  Regenerate: serve the repo root, screenshot this at 1200×630, normalise with sips —
  see the recipe in scripts/make-og-image.md. Kept out of public/ so it isn't deployed.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      .card {
        width: 1200px; height: 630px;
        background: radial-gradient(1100px 620px at 82% -14%, #24304a 0%, #0e1117 60%);
        color: #e9edf3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 74px 84px;
        display: flex; flex-direction: column; justify-content: space-between;
        position: relative; overflow: hidden;
      }
      .brand { display: flex; align-items: center; gap: 26px; }
      .mark {
        width: 96px; height: 96px; border-radius: 22px;
        background: #0b1220; display: grid; place-items: center; flex: 0 0 auto;
      }
      h1 { font-size: 74px; line-height: 1.02; font-weight: 800; letter-spacing: -0.02em; }
      h1 .yr { color: #4f9dff; }
      .tag { margin-top: 16px; font-size: 30px; color: #98a3b3; font-weight: 500; }
      .logos { display: flex; align-items: center; gap: 34px; margin: 6px 0; }
      .logos img { width: 92px; height: 92px; object-fit: contain; }
      .foot { display: flex; align-items: center; justify-content: space-between; flex-wrap: nowrap; gap: 24px; }
      .pills { display: flex; gap: 10px; }
      .pill {
        font-size: 19px; color: #cdd6e4; background: #1a2029;
        border: 1px solid #2a3341; border-radius: 11px; padding: 8px 14px; font-weight: 600;
        white-space: nowrap;
      }
      .url { font-size: 22px; color: #4f9dff; font-weight: 700; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div class="card">
      <div>
        <div class="brand">
          <span class="mark">
            <svg width="66" height="66" viewBox="0 0 64 64">
              <g transform="rotate(-38 32 32)">
                <ellipse cx="32" cy="32" rx="20" ry="12" fill="none" stroke="#4f9dff" stroke-width="3.4" />
                <path d="M16 32h32" stroke="#4f9dff" stroke-width="3" />
                <path d="M27 32h10M29 28.5h6M29 35.5h6" stroke="#4f9dff" stroke-width="2" stroke-linecap="round" />
              </g>
            </svg>
          </span>
          <h1>The NFL Schedule <span class="yr">2026</span></h1>
        </div>
        <p class="tag">Every game in your timezone — week by week, live scores, standings, and the playoff bracket.</p>
      </div>

      <div class="logos">
        <img src="/public/logos/new-england-patriots-dark.png" alt="" />
        <img src="/public/logos/buffalo-bills-dark.png" alt="" />
        <img src="/public/logos/baltimore-ravens-dark.png" alt="" />
        <img src="/public/logos/kansas-city-chiefs-dark.png" alt="" />
        <img src="/public/logos/dallas-cowboys-dark.png" alt="" />
        <img src="/public/logos/philadelphia-eagles-dark.png" alt="" />
        <img src="/public/logos/san-francisco-49ers-dark.png" alt="" />
      </div>

      <div class="foot">
        <div class="pills">
          <span class="pill">📋 Schedule</span>
          <span class="pill">📆 Week</span>
          <span class="pill">📊 Standings</span>
          <span class="pill">🏆 Playoffs</span>
          <span class="pill">📈 Stats</span>
        </div>
        <span class="url">the-nfl-schedule.netlify.app</span>
      </div>
    </div>
  </body>
</html>
